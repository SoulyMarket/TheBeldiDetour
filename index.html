<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>The Beldi Detour | Atlas Mountain Experience near Marrakech</title>

    <meta name="author" content="The Beldi Detour" />
    <link rel="canonical" href="https://thebeldidetour.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Beldi Detour" />
    <meta property="og:url" content="https://thebeldidetour.com/" />
    <meta property="og:title" content="The Beldi Detour | Atlas Mountain Experience near Marrakech" />

    <meta property="og:image:width" content="2048" />
    <meta property="og:image:height" content="1152" />
    <meta property="og:image:alt" content="Atlas Mountains at golden hour with mint tea picnic setup" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Beldi Detour | Atlas Mountain Experience" />

    <meta name="twitter:image" content="https://thebeldidetour.com/images/hero.webp" />

    <!-- Theme -->
    <meta name="theme-color" content="#2D5016" />

    <!-- Fonts: preconnect then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      rel="stylesheet"
    />

    <!-- Preload LCP image (hero) -->
    <link rel="preload" as="image" href="/images/hero.webp" fetchpriority="high" />

    <!-- Structured data: TouristAttraction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

        "@type": "PostalAddress",

      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "31.2269",
        "longitude": "-7.6572"
      },
      "offers": {
        "@type": "Offer",
        "price": "1000",
        "priceCurrency": "MAD",
        "description": "Per person, all-inclusive. Includes round-trip transfer from Marrakech.",
        "availability": "https://schema.org/InStock"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "reservations",

      },

    }

  </head>
